<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Roller - Roll Random Dice Online</title>
  <meta name="description" content="Roll standard 6-sided dice for board games. Customize the number of dice rolled.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.calcuportal.com/calculators/games-dice-roller.html">
  <link rel="stylesheet" href="../styles.css">
  <script src="../script.js"></script>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="nav-container">
      <a href="../index.html" class="logo">
        <span class="logo-icon">🧮</span>
        <span>CalcuPortal</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html" class="nav-link">Home</a>
        <a href="../pages/about.html" class="nav-link">About</a>
        <a href="../pages/contact.html" class="nav-link">Contact</a>
        <button class="theme-btn" title="Toggle Theme">
          <span class="theme-btn-icon"></span>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <div class="detail-container">
      <a href="../index.html" class="back-btn">← Back to Directory</a>
      
      <div class="detail-header">
        <h1>Dice Roller</h1>
      </div>

      <!-- Calculator Widget -->
      <div class="calc-widget">
                <div class="form-group">
          <label for="dice-count">Number of Dice</label>
          <input type="number" id="dice-count" value="2" min="1" max="10" class="input-field" />
        </div>
        <button id="calc-btn" class="calc-btn">Roll Dice</button>
        <div id="result-section" class="result-section hidden" style="text-align: center;">
          <div class="summary-title">Roll Results</div>
          <div id="dice-container" style="display:flex; justify-content:center; gap:0.5rem; margin:1rem 0;">...</div>
          <div class="total-balance" id="dice-total">Total: 7</div>
        </div>
      </div>

      <!-- SEO Article -->
      <section class="article-section">
        <div class="article-header">
          <h2>Dice Roller Guides</h2>
        </div>
        <div class="article-content">
          <h2>Virtual Dice Roller</h2><p>Missing dice for Monopoly or Yahtzee? Roll up to 10 standard 6-sided virtual dice simultaneously.</p>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="copyright-bar" style="border-top: none; padding-top: 0;">
      © <span id="year">2026</span> CalcuPortal. All rights reserved.
    </div>
  </footer>

  <script>
    document.getElementById('year').innerText = new Date().getFullYear();
    
    // Injected calculation script
    // Rename calculate button triggers
    const calculateBtn = document.getElementById('calc-btn');
    if (calculateBtn) {
      calculateBtn.id = 'calculate-btn';
    }
  </script>
  <script>
          document.getElementById('calculate-btn').addEventListener('click', () => {
        const count = parseInt(document.getElementById('dice-count').value);
        if (isNaN(count) || count <= 0 || count > 10) {
          alert('Please enter a valid count between 1 and 10.');
          return;
        }
        
        let total = 0;
        let html = '';
        for (let i = 0; i < count; i++) {
          const roll = Math.floor(Math.random() * 6) + 1;
          total += roll;
          html += <span style="background:var(--bg-primary); border:2px solid var(--border-color); font-size:1.5rem; font-weight:800; width:3.5rem; height:3.5rem; border-radius:0.5rem; display:inline-flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm);"></span>;
        }
        
        document.getElementById('dice-container').innerHTML = html;
        document.getElementById('dice-total').innerText = 'Total: ' + total;
        document.getElementById('result-section').classList.remove('hidden');
      });
  </script>
</body>
</html>
