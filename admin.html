<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local CMS Generator | CalculatorHub</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<header class="site-header"><div class="container nav"><a class="logo" href="index.html">Calculator<span>Hub</span></a><nav class="nav-links"><a href="index.html">Home</a><a href="calculators/age-calculator.html">Age Calculator</a><a class="active" href="admin.html">Local CMS</a></nav></div></header>
<section class="hero"><div class="container"><span class="badge">Static CMS Alternative</span><h1>Local CMS Page Generator</h1><p>Fill the fields, generate HTML, copy it into a new file inside the calculators folder, and upload it to GitHub.</p></div></section>
<main class="container section admin-layout">
  <section class="admin-panel">
    <h2>Page Fields</h2>
    <div class="field"><label>URL File Name</label><input id="slug" value="sip-calculator.html"></div>
    <div class="field"><label>Canonical URL</label><input id="canonical" value="https://yourusername.github.io/online-calculator/calculators/sip-calculator.html"></div>
    <div class="field"><label>Meta Title</label><input id="metaTitle" value="SIP Calculator Online | Calculate Investment Returns"></div>
    <div class="field"><label>Meta Description</label><input id="metaDesc" value="Use this free SIP calculator to estimate your mutual fund investment returns online."></div>
    <div class="field"><label>H1 Heading</label><input id="h1" value="SIP Calculator"></div>
    <div class="field"><label>Calculator Code HTML/CSS/JS</label><textarea id="calcCode"><div class="calculator-shell"><p>Add your calculator HTML, CSS, and JavaScript code here.</p></div></textarea></div>
    <div class="field"><label>SEO Content HTML</label><textarea id="seoContent"><section class="content-box"><h2>What is a SIP Calculator?</h2><p>A SIP calculator helps estimate future investment value based on monthly investment, expected return, and duration.</p></section></textarea></div>
    <div class="field"><label>FAQs JSON</label><textarea id="faqs">[{"q":"What is a SIP calculator?","a":"A SIP calculator estimates the future value of monthly investments."},{"q":"Is this SIP calculator free?","a":"Yes, this calculator is free to use."}]</textarea></div>
    <div class="admin-actions"><button class="btn" onclick="generatePage()">Generate HTML</button><button class="btn secondary" onclick="copyCode()">Copy Code</button></div>
  </section>
  <section class="admin-panel">
    <h2>Generated Page Code</h2>
    <pre class="code-output" id="output">Click Generate HTML to create page code.</pre>
  </section>
</main>
<script>
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function generatePage(){
  const slug=document.getElementById('slug').value.trim();
  const canonical=document.getElementById('canonical').value.trim();
  const metaTitle=document.getElementById('metaTitle').value.trim();
  const metaDesc=document.getElementById('metaDesc').value.trim();
  const h1=document.getElementById('h1').value.trim();
  const calcCode=document.getElementById('calcCode').value;
  const seoContent=document.getElementById('seoContent').value;
  let faqs=[];try{faqs=JSON.parse(document.getElementById('faqs').value)}catch(e){alert('FAQ JSON is invalid');return;}
  const faqSchema={"@context":"https://schema.org","@type":"FAQPage","mainEntity":faqs.map(f=>({"@type":"Question","name":f.q,"acceptedAnswer":{"@type":"Answer","text":f.a}}))};
  const faqHtml=faqs.map(f=>`<details><summary>${esc(f.q)}</summary><p>${esc(f.a)}</p></details>`).join('\n');
  const html=`<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${esc(metaTitle)}</title>
  <meta name="description" content="${esc(metaDesc)}" />
  <link rel="canonical" href="${esc(canonical)}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script type="application/ld+json">${JSON.stringify(faqSchema)}<\/script>
</head>
<body>
<header class="site-header"><div class="container nav"><a class="logo" href="../index.html">Calculator<span>Hub</span></a><nav class="nav-links"><a href="../index.html">Home</a><a href="../admin.html">Local CMS</a></nav></div></header>
<section class="hero"><div class="container"><span class="badge">Free Calculator</span><h1>${esc(h1)}</h1><p>${esc(metaDesc)}</p></div></section>
<main class="container section">
${calcCode}
${seoContent}
</main>
<section class="section"><div class="container"><h2 class="section-title">FAQs</h2><div class="faq-wrap">${faqHtml}</div></div></section>
<footer class="footer"><div class="container footer-inner"><p>© <span data-year></span> CalculatorHub. All rights reserved.</p><a href="../admin.html">Local CMS Generator</a></div></footer>
<script src="../assets/js/main.js"><\/script>
</body>
</html>`;
  document.getElementById('output').textContent=html;
}
function copyCode(){navigator.clipboard.writeText(document.getElementById('output').textContent);alert('Code copied. Create this file inside calculators folder.');}
</script>
</body>
</html>
